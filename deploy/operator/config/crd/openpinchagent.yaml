apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: openpinchagents.openpinch.dev
spec:
  group: openpinch.dev
  names:
    kind: OpenPinchAgent
    plural: openpinchagents
    singular: openpinchagent
    shortNames:
      - opa
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                gatewayImage:
                  type: string
                policyConfigMap:
                  type: string
                connectorSecret:
                  type: string
                replicas:
                  type: integer
