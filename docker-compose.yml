version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: openpinch-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama

  gateway:
    image: golang:1.26
    container_name: openpinch-gateway-dev
    working_dir: /workspace/gateway
    command: ["go", "run", "./cmd/gateway"]
    environment:
      OPENPINCH_CONFIG_PATH: /workspace/.openpinch/config.toml
      GOCACHE: /workspace/.cache/go-build
      GOMODCACHE: /workspace/.cache/go-mod
    ports:
      - "50051:50051"
    volumes:
      - ./:/workspace
    depends_on:
      - ollama

volumes:
  ollama-data:

