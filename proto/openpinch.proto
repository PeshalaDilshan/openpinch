syntax = "proto3";

package openpinch.v1;

option go_package = "github.com/PeshalaDilshan/openpinch/gateway/pkg/pb;pb";

service GatewayService {
  rpc GetStatus(Empty) returns (StatusResponse);
  rpc Execute(ExecuteRequest) returns (ExecuteResponse);
  rpc ListSkills(Empty) returns (SkillListResponse);
  rpc InstallSkill(InstallSkillRequest) returns (InstallSkillResponse);
  rpc TailLogs(LogRequest) returns (stream LogChunk);
  rpc SubmitMessage(SubmitMessageRequest) returns (SubmitMessageResponse);
  rpc ScheduleJob(ScheduleJobRequest) returns (ScheduleJobResponse);
  rpc ListConnectors(Empty) returns (ConnectorListResponse);
  rpc GetConnectorStatus(ConnectorStatusRequest) returns (ConnectorStatusResponse);
  rpc AttestSession(AttestationRequest) returns (AttestationResponse);
  rpc ExportAudit(AuditExportRequest) returns (AuditExportResponse);
  rpc QueryMemory(MemoryQueryRequest) returns (MemoryQueryResponse);
  rpc UpsertMemory(MemoryUpsertRequest) returns (MemoryUpsertResponse);
  rpc ListSessions(SessionListRequest) returns (SessionListResponse);
  rpc GetSession(SessionRequest) returns (SessionResponse);
  rpc PruneSessions(SessionPruneRequest) returns (SessionPruneResponse);
  rpc ListPairings(PairingListRequest) returns (PairingListResponse);
  rpc UpdatePairing(PairingUpdateRequest) returns (PairingUpdateResponse);
  rpc SendChannelMessage(ChannelMessageRequest) returns (ChannelMessageResponse);
  rpc GetDoctorReport(DoctorReportRequest) returns (DoctorReportResponse);
  rpc ListModelProfiles(Empty) returns (ModelProfileListResponse);
  rpc RememberBrain(BrainRememberRequest) returns (BrainRememberResponse);
  rpc RecallBrain(BrainRecallRequest) returns (BrainRecallResponse);
  rpc SuggestBrain(BrainSuggestRequest) returns (BrainSuggestResponse);
  rpc ListBrainTasks(BrainTaskListRequest) returns (BrainTaskListResponse);
  rpc UpdateBrainTask(BrainTaskUpdateRequest) returns (BrainTaskUpdateResponse);
  rpc ForgetBrain(BrainForgetRequest) returns (BrainForgetResponse);
  rpc RunAgentProtocol(AgentProtocolRequest) returns (AgentProtocolResponse);
  rpc QueueTask(QueueTaskRequest) returns (QueueTaskResponse);
  rpc GetPolicyReport(PolicyReportRequest) returns (PolicyReportResponse);
  rpc StreamUiEvents(UiEventStreamRequest) returns (stream UiEvent);
}

service EngineRuntimeService {
  rpc DeliverMessage(EngineMessageRequest) returns (SubmitMessageResponse);
  rpc RunTool(EngineToolRequest) returns (ExecuteResponse);
  rpc RunSkill(EngineSkillRequest) returns (ExecuteResponse);
  rpc Health(Empty) returns (HealthResponse);
  rpc QueryMemory(MemoryQueryRequest) returns (MemoryQueryResponse);
  rpc UpsertMemory(MemoryUpsertRequest) returns (MemoryUpsertResponse);
  rpc ListSessions(SessionListRequest) returns (SessionListResponse);
  rpc GetSession(SessionRequest) returns (SessionResponse);
  rpc PruneSessions(SessionPruneRequest) returns (SessionPruneResponse);
  rpc ListPairings(PairingListRequest) returns (PairingListResponse);
  rpc UpdatePairing(PairingUpdateRequest) returns (PairingUpdateResponse);
  rpc RecordOutboundMessage(ChannelMessageRequest) returns (ChannelMessageResponse);
  rpc GetDoctorReport(DoctorReportRequest) returns (DoctorReportResponse);
  rpc ListModelProfiles(Empty) returns (ModelProfileListResponse);
  rpc RememberBrain(BrainRememberRequest) returns (BrainRememberResponse);
  rpc RecallBrain(BrainRecallRequest) returns (BrainRecallResponse);
  rpc SuggestBrain(BrainSuggestRequest) returns (BrainSuggestResponse);
  rpc ListBrainTasks(BrainTaskListRequest) returns (BrainTaskListResponse);
  rpc UpdateBrainTask(BrainTaskUpdateRequest) returns (BrainTaskUpdateResponse);
  rpc ForgetBrain(BrainForgetRequest) returns (BrainForgetResponse);
  rpc RunAgentProtocol(AgentProtocolRequest) returns (AgentProtocolResponse);
  rpc AttestSession(AttestationRequest) returns (AttestationResponse);
  rpc ExportAudit(AuditExportRequest) returns (AuditExportResponse);
  rpc QueueTask(QueueTaskRequest) returns (QueueTaskResponse);
  rpc GetPolicyReport(PolicyReportRequest) returns (PolicyReportResponse);
}

message Empty {}

message StatusResponse {
  string status = 1;
  string version = 2;
  string runtime_endpoint = 3;
  string gateway_endpoint = 4;
  repeated string enabled_connectors = 5;
  repeated string available_model_backends = 6;
  int64 uptime_seconds = 7;
  string started_at = 8;
  string data_dir = 9;
  string log_file = 10;
  string vector_memory_backend = 11;
  string encryption_state = 12;
  string audit_mode = 13;
  string attestation_state = 14;
}

message ExecuteRequest {
  string target = 1;
  string arguments_json = 2;
  bool allow_network = 3;
  string priority = 4;
}

message ExecuteResponse {
  bool success = 1;
  string summary = 2;
  string data_json = 3;
  string error = 4;
  repeated string logs = 5;
}

message SkillInfo {
  string id = 1;
  string version = 2;
  string name = 3;
  string description = 4;
  bool installed = 5;
  bool verified = 6;
  string entrypoint = 7;
  string language = 8;
}

message SkillListResponse {
  repeated SkillInfo skills = 1;
  string registry_version = 2;
}

message InstallSkillRequest {
  string source = 1;
  bool force = 2;
}

message InstallSkillResponse {
  bool installed = 1;
  SkillInfo skill = 2;
  string message = 3;
}

message LogRequest {
  uint32 tail = 1;
  bool follow = 2;
}

message LogChunk {
  string line = 1;
  string timestamp = 2;
}

message SubmitMessageRequest {
  string connector = 1;
  string channel_id = 2;
  string sender = 3;
  string body = 4;
  string metadata_json = 5;
}

message SubmitMessageResponse {
  bool accepted = 1;
  string message_id = 2;
  string reply = 3;
  string session_id = 4;
  string pairing_id = 5;
  string delivery_state = 6;
}

message ScheduleJobRequest {
  string job_id = 1;
  string cron = 2;
  string tool = 3;
  string arguments_json = 4;
}

message ScheduleJobResponse {
  bool accepted = 1;
  string message = 2;
}

message EngineMessageRequest {
  SubmitMessageRequest message = 1;
}

message EngineToolRequest {
  string tool = 1;
  string arguments_json = 2;
  bool allow_network = 3;
  string priority = 4;
}

message EngineSkillRequest {
  string skill_id = 1;
  string arguments_json = 2;
}

message HealthResponse {
  string status = 1;
  repeated string missing_prerequisites = 2;
  string sandbox_backend = 3;
  string vector_memory_backend = 4;
  string encryption_state = 5;
  string audit_mode = 6;
}

message ConnectorInfo {
  string name = 1;
  bool enabled = 2;
  bool implemented = 3;
  string mode = 4;
  string health = 5;
  repeated string allowlist = 6;
  map<string, string> details = 7;
}

message ConnectorListResponse {
  repeated ConnectorInfo connectors = 1;
}

message ConnectorStatusRequest {
  string name = 1;
}

message ConnectorStatusResponse {
  ConnectorInfo connector = 1;
}

message AttestationRequest {
  string subject = 1;
  string nonce = 2;
  bool include_hardware = 3;
}

message AttestationResponse {
  string status = 1;
  string subject = 2;
  string platform = 3;
  bool hardware_backed = 4;
  string nonce = 5;
  string public_key = 6;
  map<string, string> measurements = 7;
}

message AuditEvent {
  string id = 1;
  string category = 2;
  string severity = 3;
  string summary = 4;
  double anomaly_score = 5;
  string payload_json = 6;
  string created_at = 7;
}

message AuditExportRequest {
  string sink = 1;
  uint32 limit = 2;
}

message AuditExportResponse {
  bool exported = 1;
  string format = 2;
  repeated AuditEvent events = 3;
}

message MemoryQueryRequest {
  string namespace = 1;
  string query = 2;
  uint32 limit = 3;
  string filter_json = 4;
}

message MemoryRecord {
  string key = 1;
  string namespace = 2;
  string content = 3;
  string metadata_json = 4;
  double score = 5;
  string created_at = 6;
}

message MemoryQueryResponse {
  repeated MemoryRecord records = 1;
  string backend = 2;
}

message MemoryUpsertRequest {
  string namespace = 1;
  string key = 2;
  string content = 3;
  string metadata_json = 4;
}

message MemoryUpsertResponse {
  bool stored = 1;
  string backend = 2;
  string digest = 3;
}

message SessionRecord {
  string id = 1;
  string connector = 2;
  string channel_id = 3;
  string participant = 4;
  string session_type = 5;
  string title = 6;
  string status = 7;
  string reply_mode = 8;
  string queue_mode = 9;
  string model_profile = 10;
  bool mention_only = 11;
  bool pending_pairing = 12;
  string last_message_preview = 13;
  uint32 message_count = 14;
  string created_at = 15;
  string updated_at = 16;
}

message SessionMessage {
  string id = 1;
  string session_id = 2;
  string connector = 3;
  string role = 4;
  string sender = 5;
  string body = 6;
  string metadata_json = 7;
  string created_at = 8;
}

message SessionListRequest {
  string connector = 1;
  string status = 2;
  bool include_archived = 3;
  uint32 limit = 4;
}

message SessionListResponse {
  string summary = 1;
  repeated SessionRecord sessions = 2;
}

message SessionRequest {
  string session_id = 1;
  uint32 limit = 2;
}

message SessionResponse {
  SessionRecord session = 1;
  repeated SessionMessage messages = 2;
}

message SessionPruneRequest {
  uint32 older_than_hours = 1;
  bool archive_only = 2;
}

message SessionPruneResponse {
  uint32 pruned = 1;
}

message PairingRecord {
  string id = 1;
  string connector = 2;
  string channel_id = 3;
  string sender = 4;
  string session_id = 5;
  string status = 6;
  string reason = 7;
  string created_at = 8;
  string updated_at = 9;
}

message PairingListRequest {
  string status = 1;
  string connector = 2;
  uint32 limit = 3;
}

message PairingListResponse {
  repeated PairingRecord pairings = 1;
}

message PairingUpdateRequest {
  string pairing_id = 1;
  string action = 2;
  string note = 3;
}

message PairingUpdateResponse {
  bool updated = 1;
  PairingRecord pairing = 2;
}

message ChannelMessageRequest {
  string connector = 1;
  string channel_id = 2;
  string sender = 3;
  string body = 4;
  string metadata_json = 5;
  string session_id = 6;
}

message ChannelMessageResponse {
  bool accepted = 1;
  string message_id = 2;
  string session_id = 3;
  string status = 4;
  string detail = 5;
}

message DoctorReportRequest {
  bool include_connectors = 1;
  bool include_models = 2;
  bool include_web = 3;
}

message DoctorFinding {
  string id = 1;
  string component = 2;
  string severity = 3;
  string status = 4;
  string summary = 5;
  string detail = 6;
}

message DoctorReportResponse {
  string status = 1;
  repeated DoctorFinding findings = 2;
}

message ModelProfile {
  string name = 1;
  repeated string provider_order = 2;
  string mode = 3;
  uint32 timeout_seconds = 4;
  uint32 retry_budget = 5;
  bool hosted = 6;
  string auth_mode = 7;
  bool default_profile = 8;
}

message ModelProfileListResponse {
  repeated ModelProfile profiles = 1;
}

message UiEventStreamRequest {
  string cursor = 1;
}

message UiEvent {
  string id = 1;
  string event_type = 2;
  string payload_json = 3;
  string created_at = 4;
}

message BrainRememberRequest {
  string kind = 1;
  string subtype = 2;
  string title = 3;
  string content = 4;
  double importance = 5;
  string scope_json = 6;
  string links_json = 7;
  string source_ref = 8;
}

message BrainEntity {
  string id = 1;
  string kind = 2;
  string subtype = 3;
  string title = 4;
  string content = 5;
  string scope_json = 6;
  string links_json = 7;
  double salience = 8;
  double confidence = 9;
  bool archived = 10;
  string created_at = 11;
  string updated_at = 12;
}

message BrainFact {
  string id = 1;
  string entity_id = 2;
  string content = 3;
  string scope_json = 4;
  double salience = 5;
  double confidence = 6;
  bool archived = 7;
  string created_at = 8;
  string updated_at = 9;
}

message BrainRelation {
  string id = 1;
  string kind = 2;
  string from_id = 3;
  string to_id = 4;
  string metadata_json = 5;
  double confidence = 6;
  string created_at = 7;
  string updated_at = 8;
}

message BrainTask {
  string id = 1;
  string title = 2;
  string summary = 3;
  string status = 4;
  string priority = 5;
  string due_at = 6;
  string scope_json = 7;
  string links_json = 8;
  double salience = 9;
  double confidence = 10;
  bool archived = 11;
  string created_at = 12;
  string updated_at = 13;
}

message BrainRememberResponse {
  bool stored = 1;
  BrainEntity entity = 2;
  BrainTask task = 3;
  string digest = 4;
}

message BrainRecallRequest {
  string query = 1;
  string scope_json = 2;
  uint32 limit = 3;
  bool include_archived = 4;
}

message BrainRecallResponse {
  string summary = 1;
  repeated BrainEntity entities = 2;
  repeated BrainFact facts = 3;
  repeated BrainRelation relations = 4;
  repeated BrainTask tasks = 5;
}

message BrainSuggestRequest {
  string scope_json = 1;
  uint32 limit = 2;
}

message BrainSuggestion {
  string id = 1;
  string task_id = 2;
  string summary = 3;
  string reason = 4;
  double score = 5;
  string context_json = 6;
}

message BrainSuggestResponse {
  string summary = 1;
  repeated BrainSuggestion suggestions = 2;
}

message BrainTaskListRequest {
  string scope_json = 1;
  repeated string statuses = 2;
  repeated string priorities = 3;
  string due_before = 4;
  uint32 limit = 5;
}

message BrainTaskListResponse {
  string summary = 1;
  repeated BrainTask tasks = 2;
}

message BrainTaskUpdateRequest {
  string task_id = 1;
  string status = 2;
  string priority = 3;
  string due_at = 4;
  string summary = 5;
  string links_json = 6;
  string source_ref = 7;
}

message BrainTaskUpdateResponse {
  bool updated = 1;
  BrainTask task = 2;
}

message BrainForgetRequest {
  string target_kind = 1;
  string target_id = 2;
  string mode = 3;
  string reason = 4;
}

message BrainForgetResponse {
  bool forgotten = 1;
  string mode = 2;
  string target_id = 3;
}

message AgentMessage {
  string sender = 1;
  string recipient = 2;
  string body = 3;
  string metadata_json = 4;
  string encrypted_body = 5;
}

message AgentProtocolRequest {
  string protocol_id = 1;
  string initiator = 2;
  repeated AgentMessage messages = 3;
  string policy_scope = 4;
}

message AgentProtocolResponse {
  bool accepted = 1;
  string protocol_id = 2;
  string transcript_json = 3;
  repeated string findings = 4;
}

message QueueTaskRequest {
  string task_id = 1;
  string task_type = 2;
  string target = 3;
  string arguments_json = 4;
  string priority = 5;
}

message QueueTaskResponse {
  bool accepted = 1;
  string task_id = 2;
  string queue = 3;
  string message = 4;
}

message PolicyReportRequest {
  string subject = 1;
  string capability = 2;
}

message PolicyReportResponse {
  string subject = 1;
  repeated string allowed_capabilities = 2;
  repeated string denied_capabilities = 3;
  string source = 4;
}
