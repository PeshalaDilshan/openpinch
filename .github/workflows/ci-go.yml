name: ci-go

permissions:
  contents: read

on:
  push:
    branches:
      - dev
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-go-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gateway

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache-dependency-path: gateway/go.sum

      - name: Format Check
        shell: bash
        run: |
          UNFORMATTED="$(gofmt -l ./cmd ./internal ./pkg)"
          if [[ -n "${UNFORMATTED}" ]]; then
            echo "The following Go files need gofmt:"
            echo "${UNFORMATTED}"
            exit 1
          fi

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...
