name: sync-labels

on:
  push:
    branches:
      - dev
      - main
    paths:
      - .github/labels.json
      - .github/workflows/sync-labels.yml
  workflow_dispatch:

permissions:
  issues: write

jobs:
  sync:
    name: Sync Repository Labels
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sync Labels From Manifest
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = ".github/labels.json";
            const desired = JSON.parse(fs.readFileSync(path, "utf8"));
            const { owner, repo } = context.repo;

            const existing = await github.paginate(
              github.rest.issues.listLabelsForRepo,
              {
                owner,
                repo,
                per_page: 100,
              },
            );

            const existingByName = new Map(
              existing.map((label) => [label.name, label]),
            );

            for (const label of desired) {
              const current = existingByName.get(label.name);

              if (!current) {
                core.info(`Creating label ${label.name}`);
                await github.rest.issues.createLabel({
                  owner,
                  repo,
                  name: label.name,
                  color: label.color,
                  description: label.description,
                });
                continue;
              }

              const currentColor = String(current.color || "").toLowerCase();
              const desiredColor = String(label.color || "").toLowerCase();
              const currentDescription = current.description || "";
              const desiredDescription = label.description || "";

              if (
                currentColor !== desiredColor ||
                currentDescription !== desiredDescription
              ) {
                core.info(`Updating label ${label.name}`);
                await github.rest.issues.updateLabel({
                  owner,
                  repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description,
                });
              }
            }
